<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>啓-KEI-pomodoro // FOCUS 25 [greenscreen]</title>

<!--
  ============================================================================
  啓-KEI-pomodoro  ─  FOCUS TIMER (25min / greenscreen master)
  ----------------------------------------------------------------------------
  ・背景はクロマキー用グリーン #00B140 → Premiere/DaVinciでキー抜き
  ・操作ボタンなし。読み込み後に 5-4-3-2-1 → 25:00 から自動カウントダウン
  ・ゲージは「溜まる」方向（0%→100%）。デジタルなスイープはゲージのみ
  ・表示は SESSION のみ
  量産（黒巻き）: 下の CONFIG の DURATION_MIN を 5 / 50 に、MODE_LABEL を変更
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --w:#ffffff;
    --w90:rgba(255,255,255,.90);
    --w55:rgba(255,255,255,.55);
    --w30:rgba(255,255,255,.30);
    --key:#00B140;            /* chroma key green */
    --glow:0 0 1px rgba(255,255,255,.95), 0 0 14px rgba(255,255,255,.35), 0 0 40px rgba(255,255,255,.18);
    --mono:"Share Tech Mono", ui-monospace, monospace;
    --code:"JetBrains Mono", ui-monospace, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--key);
    color:var(--w);
    font-family:var(--mono);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  .stage{position:relative; width:min(92vw,1100px); padding:5vh 4vw}

  .prompt{
    font-family:var(--code);
    font-size:clamp(11px,1.5vw,16px);
    letter-spacing:.04em; color:var(--w55);
    margin-bottom:clamp(24px,6vh,64px);
    white-space:nowrap; overflow:hidden;
  }
  .cursor{display:inline-block; width:.62em; height:1.05em; background:var(--w);
    margin-left:.15em; transform:translateY(.16em); animation:blink 1.05s steps(1) infinite}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

  .core{display:flex; flex-direction:column; align-items:center; gap:clamp(10px,2.2vh,22px)}

  .label{
    font-size:clamp(13px,2.2vw,22px);
    letter-spacing:.78em; text-indent:.78em;
    color:var(--w90); text-shadow:var(--glow);
  }
  .clock{
    font-family:var(--mono);
    font-size:clamp(78px,21vw,260px);
    line-height:.92; letter-spacing:.02em;
    color:var(--w); text-shadow:var(--glow);
    font-variant-numeric:tabular-nums;
  }

  /* ---- cyberpunk segmented gauge (fills up, sweep = the only running motion) ---- */
  .gauge-wrap{width:min(78vw,760px); margin-top:clamp(14px,3vh,30px)}
  .gauge{
    position:relative; height:clamp(16px,2.4vh,26px);
    border:1px solid var(--w30); overflow:hidden;
  }
  .gauge-fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:var(--w);
    box-shadow:0 0 14px rgba(255,255,255,.55);
    transition:width .35s linear;
  }
  .gauge-fill::after{ /* moving digital sweep clipped to the filled portion */
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(0,0,0,.55), transparent);
    background-size:35% 100%;
    animation:sweep 1.9s linear infinite;
    mix-blend-mode:multiply;
  }
  @keyframes sweep{0%{background-position:-40% 0}100%{background-position:140% 0}}
  .gauge .segments{ /* segment dividers punch to green → key out as clean slivers */
    position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(
      90deg, transparent 0,
      transparent calc((100% / 40) - 2px),
      var(--key) calc((100% / 40) - 2px),
      var(--key) calc(100% / 40)
    );
  }

  .session{
    font-family:var(--code);
    font-size:clamp(11px,1.45vw,15px);
    letter-spacing:.22em; color:var(--w55);
    margin-top:12px; text-align:center;
  }
  .session .k{color:var(--w30)}

  /* ---- 5-4-3-2-1 launch (no dark scrim, keys clean) ---- */
  .launch{position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center}
  .launch.on{display:flex}
  .launch .num{
    font-family:var(--mono); font-size:clamp(120px,40vw,420px);
    color:var(--w); text-shadow:var(--glow); line-height:1;
    animation:glitch .9s steps(2) 1;
  }
  @keyframes glitch{
    0%{clip-path:inset(0 0 0 0); transform:translateX(0); opacity:.2}
    12%{clip-path:inset(42% 0 38% 0); transform:translateX(-6px)}
    24%{clip-path:inset(0 0 0 0); transform:translateX(4px); opacity:1}
    40%{clip-path:inset(70% 0 8% 0); transform:translateX(-3px)}
    60%{clip-path:inset(0 0 0 0); transform:translateX(0)}
    100%{opacity:1; transform:translateX(0)}
  }

  @media (prefers-reduced-motion: reduce){
    .gauge-fill::after,.launch .num,.cursor{animation:none}
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="prompt" id="prompt"></div>
    <div class="core">
      <div class="label">FOCUS</div>
      <div class="clock" id="clock">25:00</div>
      <div class="gauge-wrap">
        <div class="gauge">
          <div class="gauge-fill" id="fill"></div>
          <div class="segments"></div>
        </div>
        <div class="session"><span class="k">SESSION</span> <span id="sess">01 / 04</span></div>
      </div>
    </div>
  </main>

  <div class="launch" id="launch"><div class="num" id="launchNum">5</div></div>

<script>
  /* ===================== CONFIG (量産用) ===================== */
  const DURATION_MIN = 25;          // ← 5 / 50 に変えて休憩版・50分版を出す
  const MODE_LABEL   = "FOCUS";     // BREAK版は "BREAK"
  const SESSION_TAG  = "01 / 04";
  const COUNT_IN     = [5,4,3,2,1];
  const AUTOSTART_MS = 600;         // 読み込み→自動開始までの間
  /* ========================================================== */

  const TOTAL = DURATION_MIN*60;
  let remaining = TOTAL, timer = null;

  const $=(id)=>document.getElementById(id);
  const clock=$("clock"), fill=$("fill"), launch=$("launch"),
        launchNum=$("launchNum"), promptEl=$("prompt"), sess=$("sess");
  document.querySelector(".label").textContent = MODE_LABEL;
  sess.textContent = SESSION_TAG;

  const fmt=(s)=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");

  function render(){
    clock.textContent = fmt(remaining);
    fill.style.width = ((TOTAL-remaining)/TOTAL*100)+"%";   // 溜まる方向
  }
  function tick(){
    if(remaining<=0){ clearInterval(timer); return; }
    remaining--; render();
  }
  function run(){ clearInterval(timer); timer=setInterval(tick,1000); }

  function countIn(){
    return new Promise((resolve)=>{
      let i=0; launch.classList.add("on");
      const step=()=>{
        if(i>=COUNT_IN.length){ launch.classList.remove("on"); resolve(); return; }
        launchNum.textContent=COUNT_IN[i];
        launchNum.style.animation="none"; void launchNum.offsetWidth; launchNum.style.animation="";
        i++; setTimeout(step,1000);
      };
      step();
    });
  }

  function typePrompt(){
    const full="kei@pomodoro:~$ focus --"+DURATION_MIN+"min --session "+SESSION_TAG;
    const reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const esc=(s)=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
    if(reduce){ promptEl.innerHTML=esc(full)+'<span class="cursor"></span>'; return; }
    let i=0;
    const t=setInterval(()=>{
      promptEl.innerHTML=esc(full.slice(0,i))+'<span class="cursor"></span>';
      i++; if(i>full.length) clearInterval(t);
    },32);
  }

  render(); typePrompt();
  setTimeout(()=>countIn().then(run), AUTOSTART_MS);   // 自動開始
</script>
</body>
</html>
