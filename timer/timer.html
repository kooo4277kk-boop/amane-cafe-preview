<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨音Cafe — FOCUS Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=M+PLUS+Rounded+1c:wght@700;800&display=swap');

  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}
  body{background:transparent;}
  /* 背景モード */
  body.bg-green  { background:#00FF00; }
  body.bg-blue   { background:#0000FF; }
  body.bg-checker{
    background-color:#c4d2d8;
    background-image:
      linear-gradient(45deg,#a9bcc4 25%,transparent 25%,transparent 75%,#a9bcc4 75%),
      linear-gradient(45deg,#a9bcc4 25%,transparent 25%,transparent 75%,#a9bcc4 75%);
    background-size:48px 48px; background-position:0 0,24px 24px;
  }
  /* ふわっとした水のアンビエント（CSS・控えめ）。alpha書き出し時はJSで消す */
  #ambient{
    position:absolute; inset:-20%; z-index:0; pointer-events:none; opacity:.0;
    background:
      radial-gradient(40% 30% at 30% 35%, rgba(175,228,255,.20), transparent 70%),
      radial-gradient(45% 35% at 72% 62%, rgba(150,210,255,.16), transparent 72%),
      radial-gradient(30% 24% at 55% 20%, rgba(210,245,255,.14), transparent 70%);
    filter:blur(8px);
    animation:drift 14s ease-in-out infinite alternate;
    transition:opacity 1.4s ease;
  }
  @keyframes drift{
    0%{transform:translate3d(-2%, -1%,0) scale(1.02);}
    100%{transform:translate3d(2%, 2%,0) scale(1.06);}
  }

  #c3d{ position:absolute; inset:0; z-index:1; pointer-events:none; }

  #ui{
    position:absolute; inset:0; z-index:2; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Baloo 2','M PLUS Rounded 1c',sans-serif;
    /* 出現演出：最初はにじんで透明 */
    opacity:0; filter:blur(18px); transform:scale(.96);
    transition:opacity 1.2s ease, filter 1.3s ease, transform 1.3s cubic-bezier(.18,.9,.25,1);
  }
  #ui.in{ opacity:1; filter:blur(0); transform:scale(1); }
  #ui.out{ opacity:0; filter:blur(22px); transform:scale(1.05); transition:opacity 1.5s ease, filter 1.6s ease, transform 1.6s ease; }

  .focus{
    font-weight:700; letter-spacing:.42em; text-indent:.42em;
    font-size:30px; color:#fff; opacity:.92;
    text-shadow:0 2px 18px rgba(120,200,255,.55), 0 0 2px rgba(255,255,255,.6);
    margin-bottom:6px;
  }
  .time{
    font-weight:800; font-size:150px; line-height:1; color:#fff;
    letter-spacing:.01em; font-variant-numeric:tabular-nums;
    text-shadow:0 6px 34px rgba(120,200,255,.5), 0 1px 2px rgba(255,255,255,.5);
  }
  /* 長いゲージ1本 */
  .gauge{
    margin-top:30px; width:440px; max-width:76vw; height:18px; border-radius:999px;
    background:rgba(255,255,255,.26);
    box-shadow:inset 0 1px 4px rgba(60,110,150,.28), 0 0 0 1.5px rgba(255,255,255,.55), 0 4px 14px rgba(120,200,255,.25);
    overflow:hidden; position:relative;
  }
  .gauge .fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(90deg,#bfe9ff,#8fd2ff 60%,#73c4ff);
    box-shadow:0 0 14px rgba(140,210,255,.85);
    border-radius:999px;
  }
  .gauge .fill::after{ /* 水面のハイライト */
    content:""; position:absolute; right:-2px; top:0; bottom:0; width:10px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.9));
    border-radius:999px;
  }
  /* 4つの丸 */
  .dots{ margin-top:24px; display:flex; gap:20px; }
  .dot{
    width:17px; height:17px; border-radius:50%;
    background:rgba(255,255,255,.22);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.62);
  }
  .dot.done{
    background:radial-gradient(circle at 35% 32%,#eaf8ff,#9bd6ff 70%,#79c6ff);
    box-shadow:0 0 10px rgba(140,210,255,.8), inset 0 0 0 1px rgba(255,255,255,.6);
  }
  .dot.active{
    background:radial-gradient(circle at 35% 32%,#ffffff,#bfe9ff 70%,#8fd2ff);
    box-shadow:0 0 16px rgba(150,215,255,.95), inset 0 0 0 1px rgba(255,255,255,.7);
    animation:slowblink 10s ease-in-out infinite;
  }
  @keyframes slowblink{ 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.32; transform:scale(.86);} }
</style>
</head>
<body>
  <div id="ambient"></div>
  <canvas id="c3d"></canvas>
  <div id="ui">
    <div class="focus">FOCUS</div>
    <div class="time" id="time">25:00</div>
    <div class="gauge"><div class="fill" id="fill"></div></div>
    <div class="dots" id="dots"></div>
  </div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
/* ===================== パラメータ（上部にまとめて変数化） ===================== */
const Q = new URLSearchParams(location.search);
const P = {
  workMin:    parseFloat(Q.get('workMin')   ?? 25),     // 集中の分数（既定25）
  breakMin:   parseFloat(Q.get('breakMin')  ?? 5),
  sets:       parseInt  (Q.get('sets')      ?? 4),      // 丸の数
  currentSet: parseInt  (Q.get('set')       ?? 1),      // 今が何セット目か（1始まり・動画ごとに変える）
  startDelay: parseFloat(Q.get('startDelay')?? 5),      // 出現後カウント開始まで待つ秒
  endHold:    parseFloat(Q.get('endHold')   ?? 5),      // 00:00後に消えるまで待つ秒
  bgMode:     (Q.get('bgMode') ?? 'checker'),           // alpha / green / blue / checker
  demo:       parseFloat(Q.get('demo') ?? 1),           // 1=実時間, 大きいほど早送り(確認用)
  accent:     (Q.get('accent') ?? '#bfe9ff'),
};
document.body.classList.add('bg-' + P.bgMode);
const isAlpha = (P.bgMode === 'alpha');
// アンビエントの水モヤはプレビュー(checker)時のみ。クロマ/透過書き出しでは消してキー抜きを汚さない
if(P.bgMode === 'checker'){ document.getElementById('ambient').style.opacity = '1'; }

/* ===================== DOM ===================== */
const ui = document.getElementById('ui');
const elTime = document.getElementById('time');
const elFill = document.getElementById('fill');
const elDots = document.getElementById('dots');
for(let i=0;i<P.sets;i++){
  const d=document.createElement('div'); d.className='dot';
  if(i < P.currentSet-1) d.classList.add('done');
  else if(i === P.currentSet-1) d.classList.add('active');
  elDots.appendChild(d);
}
function fmt(sec){ sec=Math.max(0,Math.ceil(sec)); const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
elTime.textContent = fmt(P.workMin*60);

/* ===================== Three.js（水滴＋波紋＋グロー） ===================== */
const canvas=document.getElementById('c3d');
const renderer=new THREE.WebGLRenderer({canvas, alpha:true, antialias:true, premultipliedAlpha:true});
renderer.setClearColor(0x000000,0);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
let W=innerWidth,H=innerHeight;
const cam=new THREE.OrthographicCamera(-W/2,W/2,H/2,-H/2,-1000,1000);
cam.position.z=10;
function resize(){ W=innerWidth;H=innerHeight; renderer.setSize(W,H); cam.left=-W/2;cam.right=W/2;cam.top=H/2;cam.bottom=-H/2; cam.updateProjectionMatrix(); }
resize(); addEventListener('resize',resize);

const accentCol = new THREE.Color(P.accent);

// ソフトな丸グローのテクスチャ
function glowTex(){
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  const g=x.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(.25,'rgba(200,240,255,.9)');
  g.addColorStop(.6,'rgba(150,210,255,.35)'); g.addColorStop(1,'rgba(150,210,255,0)');
  x.fillStyle=g; x.fillRect(0,0,256,256); return new THREE.CanvasTexture(c);
}
const gtex=glowTex();

// 中央のソフトグロー（数字の後ろでポワーンと光る）
const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:gtex,transparent:true,opacity:0,depthTest:false,blending:THREE.NormalBlending}));
glow.scale.set(520,520,1); glow.position.set(0,18,0); scene.add(glow);

// 水滴（しずく）：フレネルで縁が光る球
const dropGeo=new THREE.SphereGeometry(20,48,48);
const dropMat=new THREE.ShaderMaterial({
  transparent:true, depthWrite:false,
  uniforms:{ uCol:{value:accentCol}, uOpac:{value:0} },
  vertexShader:`varying vec3 vN; varying vec3 vV;
    void main(){ vN=normalize(normalMatrix*normal); vec4 mv=modelViewMatrix*vec4(position,1.); vV=normalize(-mv.xyz); gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`varying vec3 vN; varying vec3 vV; uniform vec3 uCol; uniform float uOpac;
    void main(){ float f=pow(1.0-max(dot(vN,vV),0.0),1.8); vec3 col=mix(uCol*0.7, vec3(1.0), f);
      float a=(0.30+0.70*f)*uOpac; gl_FragColor=vec4(col,a); }`
});
const drop=new THREE.Mesh(dropGeo,dropMat); drop.position.set(0,H/2+60,0); drop.visible=false; scene.add(drop);

// 波紋リング（プール）
const rings=[];
for(let i=0;i<6;i++){
  const m=new THREE.Mesh(new THREE.RingGeometry(0.86,1.0,80),
    new THREE.MeshBasicMaterial({color:accentCol,transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide}));
  m.visible=false; scene.add(m); rings.push({m,t:0,life:0,delay:0,max:0});
}
function spawnRipples(cx,cy){
  rings.forEach((r,i)=>{ r.m.position.set(cx,cy,0); r.t=0; r.delay=i*0.12; r.life=1.5+i*0.12; r.max=130+i*90; r.m.visible=true; });
}
// 跳ねる小しずく
const splashes=[];
for(let i=0;i<10;i++){
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:gtex,transparent:true,opacity:0,depthTest:false}));
  s.scale.set(16,16,1); s.visible=false; scene.add(s); splashes.push({s,vx:0,vy:0,t:0,life:0});
}
function spawnSplash(cx,cy){
  splashes.forEach((p,i)=>{ const a=(-0.5-Math.random()*Math.PI*0.0)+ (Math.random()*Math.PI); const ang=(Math.PI*0.15)+(Math.PI*0.7)*(i/splashes.length); const sp=120+Math.random()*160;
    p.s.position.set(cx,cy,0); p.vx=Math.cos(ang)*sp*(Math.random()<.5?-1:1)*0.5 + (Math.random()-0.5)*40; p.vy=Math.sin(ang)*sp+120; p.t=0; p.life=0.6+Math.random()*0.5; p.s.visible=true; });
}

/* ===================== タイムライン ===================== */
const NOW=()=>performance.now()/1000;
let state='intro', t0=NOW();
const centerY=18;            // UIの中心と合わせる
const impactY=centerY;
let countStart=0, total=P.workMin*60, ended=false;

function setState(s){ state=s; t0=NOW(); }
// intro: しずく落下
drop.visible=true; dropMat.uniforms.uOpac.value=0;

function update(){
  const t=NOW()-t0;
  if(state==='intro'){
    // 0.15s フェードイン → 0.95sかけて落下
    const fall=Math.min(t/0.95,1);
    const e=fall*fall; // ease-in
    const y=(H/2+60) + (impactY-(H/2+60))*e;
    drop.position.y=y;
    dropMat.uniforms.uOpac.value=Math.min(t/0.2,1);
    // 落下に従い少し縦長（しずく感）
    drop.scale.set(1-0.18*e, 1+0.30*e, 1);
    if(fall>=1){
      // 着水：潰す→波紋＆スプラッシュ→UIをにじみ出す
      spawnRipples(0,impactY); spawnSplash(0,impactY);
      glowMatPulse();
      drop.scale.set(1.5,0.5,1);
      setState('squash');
    }
  } else if(state==='squash'){
    const k=Math.min(t/0.25,1);
    drop.scale.set(1.5+1.0*k, 0.5*(1-k), 1);
    dropMat.uniforms.uOpac.value=(1-k);
    if(k>=1){ drop.visible=false; ui.classList.add('in'); setState('hold'); elTime.textContent=fmt(total); }
  } else if(state==='hold'){
    if(t>=P.startDelay){ countStart=NOW(); setState('running'); }
  } else if(state==='running'){
    const elapsed=(NOW()-countStart)*P.demo;
    const remain=total-elapsed;
    elTime.textContent=fmt(remain);
    elFill.style.width=Math.min(100,(elapsed/total)*100)+'%';
    if(remain<=0 && !ended){ ended=true; elTime.textContent='00:00'; elFill.style.width='100%';
      // 現在セットの丸を満たす
      const dots=elDots.children; if(dots[P.currentSet-1]){ dots[P.currentSet-1].classList.remove('active'); dots[P.currentSet-1].classList.add('done'); }
      setState('endhold'); }
  } else if(state==='endhold'){
    if(t>=P.endHold){ ui.classList.remove('in'); ui.classList.add('out'); spawnRipplesInward(); setState('gone'); }
  }

  // 波紋更新
  rings.forEach(r=>{ if(!r.m.visible) return; r.t+=1/60; const lt=r.t-r.delay; if(lt<0) return;
    const k=lt/r.life; if(k>=1){ r.m.visible=false; return; }
    const sc=4+k*r.max; r.m.scale.set(sc,sc,1); r.m.material.opacity=(1-k)*0.5; });
  // スプラッシュ更新（重力）
  splashes.forEach(p=>{ if(!p.s.visible) return; p.t+=1/60; if(p.t>=p.life){ p.s.visible=false; return; }
    p.vy-=520*(1/60); p.s.position.x+=p.vx*(1/60); p.s.position.y+=p.vy*(1/60);
    const k=p.t/p.life; p.s.material.opacity=(1-k)*0.9; p.s.scale.setScalar(16*(1-0.5*k)); });

  // グローの呼吸
  if(glow.material.opacity>0 && state!=='gone'){ glow.material.opacity=Math.max(glow.material.opacity, baseGlow*(0.9+0.1*Math.sin(NOW()*1.3))); }

  renderer.render(scene,cam);
  requestAnimationFrame(update);
}
let baseGlow=0;
function glowMatPulse(){ baseGlow=0.0; glow.material.opacity=0; let s=NOW();
  const ramp=()=>{ const k=Math.min((NOW()-s)/1.1,1); baseGlow=0.55*k; glow.material.opacity=baseGlow; if(k<1) requestAnimationFrame(ramp); };
  ramp();
}
function spawnRipplesInward(){ /* 消える時：内側に収束する微かな波紋 */ spawnRipples(0,impactY); rings.forEach((r,i)=>{ r.max=-(80+i*40); }); }

update();
</script>
</body>
</html>
