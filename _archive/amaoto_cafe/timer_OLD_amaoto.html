<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨音Cafe — FOCUS Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=M+PLUS+Rounded+1c:wght@700;800&display=swap');

  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}
  body{background:transparent;}
  body.bg-green  { background:#00FF00; }
  body.bg-blue   { background:#0000FF; }
  body.bg-checker{
    background-color:#c4d2d8;
    background-image:
      linear-gradient(45deg,#a9bcc4 25%,transparent 25%,transparent 75%,#a9bcc4 75%),
      linear-gradient(45deg,#a9bcc4 25%,transparent 25%,transparent 75%,#a9bcc4 75%);
    background-size:48px 48px; background-position:0 0,24px 24px;
  }

  #c3d{ position:absolute; inset:0; z-index:1; pointer-events:none; }

  #ui{
    position:absolute; inset:0; z-index:2; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Baloo 2','M PLUS Rounded 1c',sans-serif;
    opacity:0; filter:blur(18px); transform:scale(.965);
    transition:opacity 1.2s ease, filter 1.3s ease, transform 1.3s cubic-bezier(.18,.9,.25,1);
  }
  #ui.in{ opacity:1; filter:blur(0); transform:scale(1); }
  #ui.out{ opacity:0; filter:blur(22px); transform:scale(1.05); transition:opacity 1.5s ease, filter 1.6s ease, transform 1.6s ease; }

  .focus{
    font-weight:700; letter-spacing:.42em; text-indent:.42em;
    font-size:30px; color:#fff; opacity:.95;
    text-shadow:0 2px 16px rgba(255,255,255,.5);
    margin-bottom:6px;
  }
  .time{
    font-weight:800; font-size:150px; line-height:1; color:#fff;
    letter-spacing:.01em; font-variant-numeric:tabular-nums;
    text-shadow:0 6px 30px rgba(255,255,255,.45), 0 1px 2px rgba(255,255,255,.4);
  }
  /* 長いゲージ1本（白） */
  .gauge{
    margin-top:30px; width:440px; max-width:76vw; height:18px; border-radius:999px;
    background:rgba(255,255,255,.20);
    box-shadow:inset 0 1px 4px rgba(0,0,0,.10), 0 0 0 1.5px rgba(255,255,255,.55);
    overflow:hidden; position:relative;
  }
  .gauge .fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(180deg,#ffffff,#f2f6f8);
    box-shadow:0 0 12px rgba(255,255,255,.85);
    border-radius:999px;
  }
  .gauge .fill::after{
    content:""; position:absolute; right:-1px; top:0; bottom:0; width:9px;
    background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.95));
    border-radius:999px;
  }
  /* 4つの丸（白・形は維持） */
  .dots{ margin-top:24px; display:flex; gap:20px; }
  .dot{
    width:17px; height:17px; border-radius:50%;
    background:rgba(255,255,255,.22);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.65);
  }
  .dot.done{
    background:radial-gradient(circle at 35% 32%,#ffffff,#eef3f5 72%,#e3eaed);
    box-shadow:0 0 8px rgba(255,255,255,.8), inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .dot.active{
    background:radial-gradient(circle at 35% 32%,#ffffff,#f4f8f9 72%);
    box-shadow:0 0 14px rgba(255,255,255,.95), inset 0 0 0 1px rgba(255,255,255,.8);
    animation:slowblink 10s ease-in-out infinite;
  }
  @keyframes slowblink{ 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.34; transform:scale(.86);} }
</style>
</head>
<body>
  <canvas id="c3d"></canvas>
  <div id="ui">
    <div class="focus" id="focus">FOCUS</div>
    <div class="time" id="time">25:00</div>
    <div class="gauge"><div class="fill" id="fill"></div></div>
    <div class="dots" id="dots"></div>
  </div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
/* ===================== パラメータ ===================== */
const Q = new URLSearchParams(location.search);
const P = {
  workMin:    parseFloat(Q.get('workMin')   ?? 25),
  breakMin:   parseFloat(Q.get('breakMin')  ?? 5),
  sets:       parseInt  (Q.get('sets')      ?? 4),
  currentSet: parseInt  (Q.get('set')       ?? 1),
  startDelay: parseFloat(Q.get('startDelay')?? 5),
  endHold:    parseFloat(Q.get('endHold')   ?? 5),
  bgMode:     (Q.get('bgMode') ?? 'checker'),
  demo:       parseFloat(Q.get('demo') ?? 1),
  label:      (Q.get('label') ?? 'FOCUS'),
};
document.body.classList.add('bg-' + P.bgMode);
document.getElementById('focus').textContent = P.label;
if(!P.label) document.getElementById('focus').style.display='none';

/* ===================== DOM ===================== */
const ui=document.getElementById('ui'), elTime=document.getElementById('time'),
      elFill=document.getElementById('fill'), elDots=document.getElementById('dots');
for(let i=0;i<P.sets;i++){ const d=document.createElement('div'); d.className='dot';
  if(i<P.currentSet-1) d.classList.add('done'); else if(i===P.currentSet-1) d.classList.add('active');
  elDots.appendChild(d); }
function fmt(sec){ sec=Math.max(0,Math.ceil(sec)); const m=Math.floor(sec/60),s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
elTime.textContent=fmt(P.workMin*60);

/* ===================== Three.js（白い雫＋王冠スプラッシュ＋波紋） ===================== */
const canvas=document.getElementById('c3d');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true,premultipliedAlpha:true});
renderer.setClearColor(0x000000,0); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
let W=innerWidth,H=innerHeight;
const cam=new THREE.OrthographicCamera(-W/2,W/2,H/2,-H/2,-1000,1000); cam.position.z=10;
function resize(){ W=innerWidth;H=innerHeight; renderer.setSize(W,H); cam.left=-W/2;cam.right=W/2;cam.top=H/2;cam.bottom=-H/2; cam.updateProjectionMatrix(); }
resize(); addEventListener('resize',resize);

// 白いソフトグロー
function glowTex(){ const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  const g=x.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(.35,'rgba(255,255,255,.65)');
  g.addColorStop(.7,'rgba(255,255,255,.18)'); g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,256,256); return new THREE.CanvasTexture(c); }
const gtex=glowTex();

// ブルーム代わりの2層グロー（白）
const glowWide=new THREE.Sprite(new THREE.SpriteMaterial({map:gtex,transparent:true,opacity:0,depthTest:false}));
glowWide.scale.set(640,640,1); glowWide.position.set(0,18,0); scene.add(glowWide);
const glowTight=new THREE.Sprite(new THREE.SpriteMaterial({map:gtex,transparent:true,opacity:0,depthTest:false}));
glowTight.scale.set(300,300,1); glowTight.position.set(0,18,0); scene.add(glowTight);

// 雫の形（LatheGeometry：丸い底＋尖った頭＝水滴）
function teardropGeo(size){
  const R=0.5, topLen=1.25*R, pts=[]; const NB=16, NT=16;
  for(let i=0;i<=NB;i++){ const a=(i/NB)*(Math.PI/2); pts.push(new THREE.Vector2(Math.max(.001,R*Math.sin(a)), R*(1-Math.cos(a)))); } // 底の半球 0..R
  for(let i=1;i<=NT;i++){ const u=i/NT; pts.push(new THREE.Vector2(Math.max(.001,R*Math.pow(1-u,1.7)), R + topLen*u)); } // 頭へ尖る
  const g=new THREE.LatheGeometry(pts,48); g.translate(0,-(R+topLen)/2,0); g.scale(size,size,size); return g;
}
const dropMat=new THREE.ShaderMaterial({ transparent:true, depthWrite:false,
  uniforms:{ uOpac:{value:0} },
  vertexShader:`varying vec3 vN; varying vec3 vV;
    void main(){ vN=normalize(normalMatrix*normal); vec4 mv=modelViewMatrix*vec4(position,1.); vV=normalize(-mv.xyz); gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`varying vec3 vN; varying vec3 vV; uniform float uOpac;
    void main(){ float f=pow(1.0-max(dot(vN,vV),0.0),1.6);
      // 内側は半透明・縁は明るい白（ガラス/水っぽく）
      float a=(0.18+0.82*f)*uOpac; vec3 col=vec3(1.0);
      gl_FragColor=vec4(col, a); }`
});
const drop=new THREE.Mesh(teardropGeo(34),dropMat); drop.position.set(0,H/2+60,0); scene.add(drop);
// ハイライト（小さな白い点・しずくのツヤ）
const hi=new THREE.Sprite(new THREE.SpriteMaterial({map:gtex,transparent:true,opacity:0,depthTest:false}));
hi.scale.set(26,26,1); scene.add(hi);

// 波紋（薄い白リング）
const rings=[]; for(let i=0;i<5;i++){ const m=new THREE.Mesh(new THREE.RingGeometry(0.9,1.0,96),
  new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide}));
  m.visible=false; scene.add(m); rings.push({m,t:0,delay:0,life:0,max:0}); }
function spawnRipples(cx,cy,dir){ rings.forEach((r,i)=>{ r.m.position.set(cx,cy,0); r.t=0; r.delay=i*0.13; r.life=1.4+i*0.12; r.max=(dir||1)*(120+i*85); r.m.visible=true; }); }

// 王冠スプラッシュ（小さな白い雫が放射状に跳ねる）
const crown=[]; for(let i=0;i<12;i++){ const m=new THREE.Mesh(teardropGeo(11),
  new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,depthWrite:false}));
  m.visible=false; scene.add(m); crown.push({m,vx:0,vy:0,t:0,life:0,rot:0}); }
function spawnCrown(cx,cy){ crown.forEach((p,i)=>{ const ang=(Math.PI*0.16)+(Math.PI*0.68)*(i/(crown.length-1)); const sp=150+Math.random()*120;
  p.m.position.set(cx,cy,0); p.vx=Math.cos(ang)*sp*(i%2?1:-1)*0.7+(Math.random()-.5)*30; p.vy=Math.sin(ang)*sp+160; p.t=0; p.life=0.7+Math.random()*0.5; p.m.visible=true; p.m.material.opacity=0; }); }

/* ===================== タイムライン ===================== */
const RENDER = (Q.get('render')==='1');   // オフライン書き出し用：仮想時計で1フレームずつ駆動
let VT=0, lastVT=0;
const NOW=()=> RENDER ? VT : performance.now()/1000;
if(RENDER){ ui.style.transition='none'; }
let state='intro', t0=NOW();
const impactY=18; let countStart=0, total=P.workMin*60, ended=false, baseGlow=0;
let impactAt=null, bloomAt=null, dissolveAt=null;
const clamp01=x=>Math.max(0,Math.min(1,x));
function setState(s){ state=s; t0=NOW(); }
function applyUIRender(){
  let op=0, blur=18, scale=0.965;
  if(bloomAt!=null){ const k=clamp01((VT-bloomAt)/1.25); op=k; blur=18*(1-k); scale=0.965+0.035*k; }
  if(dissolveAt!=null){ const k=clamp01((VT-dissolveAt)/1.55); op=1-k; blur=22*k; scale=1+0.05*k; }
  ui.style.opacity=op; ui.style.filter='blur('+blur.toFixed(2)+'px)'; ui.style.transform='scale('+scale.toFixed(3)+')';
  const ad=elDots.querySelector('.dot.active');
  if(ad){ ad.style.animation='none'; const b=0.34+0.66*(0.5+0.5*Math.cos(2*Math.PI*VT/10)); ad.style.opacity=b.toFixed(3); ad.style.transform='scale('+(0.86+0.14*((b-0.34)/0.66)).toFixed(3)+')'; }
}

function update(){
  const t=NOW()-t0; const dt = RENDER ? Math.max(0, VT-lastVT) : 1/60; lastVT=VT;
  if(state==='intro'){
    const fall=Math.min(t/0.9,1), e=fall*fall;
    const y=(H/2+60)+(impactY-(H/2+60))*e;
    drop.position.y=y;
    dropMat.uniforms.uOpac.value=Math.min(t/0.18,1);
    // 落下で縦に伸びる（モーション感）→ 着地直前で戻す
    const stretch=1+0.55*Math.sin(Math.min(fall,0.85)*Math.PI*0.6);
    drop.scale.set(1/Math.sqrt(stretch),stretch,1/Math.sqrt(stretch));
    hi.position.set(drop.position.x-8, drop.position.y+8, 0); hi.material.opacity=dropMat.uniforms.uOpac.value*0.9;
    if(fall>=1){ spawnRipples(0,impactY,1); spawnCrown(0,impactY); pulseGlow(); drop.scale.set(1.6,0.42,1.6); setState('squash'); }
  } else if(state==='squash'){
    const k=Math.min(t/0.28,1);
    drop.scale.set(1.6+1.0*k, 0.42*(1-k), 1.6); dropMat.uniforms.uOpac.value=(1-k); hi.material.opacity=(1-k)*0.6;
    if(k>=1){ drop.visible=false; hi.visible=false; bloomAt=NOW(); if(!RENDER) ui.classList.add('in'); elTime.textContent=fmt(total); setState('hold'); }
  } else if(state==='hold'){ if(t>=P.startDelay){ countStart=NOW(); setState('running'); } }
  else if(state==='running'){
    const elapsed=(NOW()-countStart)*P.demo, remain=total-elapsed;
    elTime.textContent=fmt(remain); elFill.style.width=Math.min(100,(elapsed/total)*100)+'%';
    if(remain<=0&&!ended){ ended=true; elTime.textContent='00:00'; elFill.style.width='100%';
      const d=elDots.children[P.currentSet-1]; if(d){ d.classList.remove('active'); d.classList.add('done'); } setState('endhold'); }
  } else if(state==='endhold'){ if(t>=P.endHold){ dissolveAt=NOW(); if(!RENDER){ ui.classList.remove('in'); ui.classList.add('out'); } spawnRipples(0,impactY,-1); setState('gone'); } }

  rings.forEach(r=>{ if(!r.m.visible)return; r.t+=dt; const lt=r.t-r.delay; if(lt<0)return; const k=lt/r.life;
    if(k>=1){ r.m.visible=false; return; } const sc=4+k*Math.abs(r.max); r.m.scale.set(sc,sc,1); r.m.material.opacity=(1-k)*0.55; });
  crown.forEach(p=>{ if(!p.m.visible)return; p.t+=dt; if(p.t>=p.life){ p.m.visible=false; return; }
    p.vy-=560*dt; p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.rotation.z=Math.atan2(p.vy,p.vx)-Math.PI/2;
    const k=p.t/p.life; p.m.material.opacity=Math.min(1,(1-k)*1.4)*0.95; p.m.scale.setScalar(1-0.35*k); });

  if(impactAt!=null) baseGlow=0.6*clamp01((NOW()-impactAt)/1.1);
  if(state!=='gone'){ const breath=baseGlow*(0.92+0.08*Math.sin(NOW()*1.4));
    glowWide.material.opacity=breath*0.5; glowTight.material.opacity=breath; }
  else { glowWide.material.opacity*=0.96; glowTight.material.opacity*=0.96; }

  if(RENDER) applyUIRender();
  renderer.render(scene,cam);
  if(!RENDER) requestAnimationFrame(update);
}
function pulseGlow(){ impactAt=NOW(); }
if(RENDER){ window.__renderTo=(tt)=>{ VT=tt; update(); }; window.__ready=true; }
else { update(); }
</script>
</body>
</html>
