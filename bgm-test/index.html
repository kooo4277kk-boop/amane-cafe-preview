<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>フォルダテスト — pomodoro BGM</title>
<style>
  :root{ --bg:#1b1726; --bg2:#2a2238; --card:#322a44; --ink:#f3edff; --sub:#bdb2d8; --acc:#ffb38a; --acc2:#8ad8ff; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--ink);background:radial-gradient(120% 90% at 20% 0%,#3a2f55 0%,var(--bg) 55%) fixed;
    padding:env(safe-area-inset-top) 16px calc(28px + env(safe-area-inset-bottom));}
  .wrap{max-width:560px;margin:0 auto}
  header{padding:30px 4px 14px}
  .tag{display:inline-block;font-size:12px;letter-spacing:.18em;color:var(--acc);border:1px solid var(--acc);
    border-radius:999px;padding:4px 12px;opacity:.9}
  h1{font-size:25px;margin:14px 0 4px;font-weight:800}
  .lead{color:var(--sub);font-size:14px;line-height:1.7;margin:0}
  .track{background:var(--card);border:1px solid #ffffff14;border-radius:18px;padding:18px 16px 16px;margin-top:18px;
    box-shadow:0 10px 30px #00000040}
  .t-top{display:flex;align-items:center;gap:13px}
  .disc{width:46px;height:46px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 50% 50%,#0000 0 8px,#5a4d77 9px 10px,#3a3150 11px 60%);
    box-shadow:inset 0 0 0 2px #ffffff10;animation:spin 6s linear infinite paused}
  .disc.play{animation-play-state:running}
  @keyframes spin{to{transform:rotate(360deg)}}
  .t-meta b{display:block;font-size:16px}
  .t-meta span{font-size:12px;color:var(--sub)}
  audio{width:100%;margin-top:14px;border-radius:12px}
  .note{color:var(--sub);font-size:12.5px;line-height:1.7;margin-top:22px;
    border-top:1px dashed #ffffff22;padding-top:16px}
  .note b{color:var(--acc2)}
  footer{margin-top:22px;text-align:center;color:#7d7298;font-size:11.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">FOLDER TEST</span>
    <h1>ポモドーロBGM 試作プレイヤー</h1>
    <p class="lead">けいさん、スマホでもここから直接再生できるよ。これが「フォルダテスト」第1号！</p>
  </header>

  <div class="track">
    <div class="t-top">
      <div class="disc" id="disc"></div>
      <div class="t-meta">
        <b>lofi_test_01</b>
        <span>lo-fi hip hop / 74BPM / 約1分19秒 / 試作</span>
      </div>
    </div>
    <audio id="a" controls preload="metadata" src="lofi_test_01.mp3"></audio>
  </div>

  <p class="note">
    <b>これは音質テストじゃなく「仕組みテスト」だよ。</b><br>
    今の曲は、課金なしであたしがコードで合成したラフ音源。<br>
    本番のちゃんとした商用BGMは Suno（有料プラン）が必要で、けいさんのログイン＋GOが出てから作るね。<br>
    この仕組みが動けば、今後は曲ができるたびにここに並べていける。
  </p>
  <footer>pomodoro-K / Rin — folder test</footer>
</div>
<script>
  const a=document.getElementById('a'), d=document.getElementById('disc');
  a.addEventListener('play',()=>d.classList.add('play'));
  a.addEventListener('pause',()=>d.classList.remove('play'));
</script>
</body>
</html>
